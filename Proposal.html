<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Special Proposal</title>

  <style>

 body{
    font-family: Arial, sans-serif;
    background: linear-gradient(pink, lightblue);
    height: 100vh;
    margin: 0;
    overflow: hidden;
 }

 .container{
    background: white;
    padding: 30px;
    width: 400px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
    text-align: center;

    position: absolute;
    left: 40%;
    top: 30%;
 }

 button{
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
 }

 .accept{
    background: green;
    color: white;
 }

 .deny{
    background: red;
    color: white;
 }

 #message{
    margin-top: 15px;
    font-size: 16px;
 }

</style>
</head>


<body>

<div class="container">

<h2 id="question">Will you be my girlfriend? ❤️</h2>

<button class="accept" onclick="acceptLove()">Accept</button>
<button class="deny" onclick="denyLove()">Deny</button>

<p id="message"></p>

</div>

<script>

let denyCount = 0;

let funnyMessages = [
"Are you sure? Think again 😢",
"Really? Maybe your mouse slipped 😏",
"Come on... give me one chance 🥺",
"Why are you doing this to me 😭",
"This is getting embarrassing 😂",
"Okay... last chance before I cry 😭"
];

function denyLove()
{
    let container = document.querySelector(".container");

    let x = Math.random() * (window.innerWidth - 400);
    let y = Math.random() * (window.innerHeight - 200);

    container.style.left = x + "px";
    container.style.top = y + "px";

    if(denyCount < funnyMessages.length)
    {
        document.getElementById("message").innerHTML = funnyMessages[denyCount];
        denyCount++;
    }
    else
    {
        document.getElementById("message").innerHTML =
        "You cannot escape this proposal 😎 Just click ACCEPT!";
    }
}


function acceptLove()
{
    let pages = [
    "You made my day! ❤️",
    "Best decision ever! 💕",
    "Our love story begins now 💖",
    "Forever starts today 💍",
    "Unlimited love and pizza for you 🍕❤️"
    ];

    let randomPage = pages[Math.floor(Math.random()*pages.length)];

    document.getElementById("question").innerHTML = randomPage;
    document.getElementById("message").innerHTML =
    "Thank you for accepting my proposal 😊";

}

</script>

</body>
</html>
